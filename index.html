<!DOCTYPE html>  <html lang="fr">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <meta name="apple-mobile-web-app-capable" content="yes">  
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">  
    <title>MKA Pro Business V5.3.0 - Full Logic</title>  
    <style>  
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; margin: 0; color: white; padding-bottom: 50px; }  
        .container { background: white; color: black; margin: 10px; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }  
        input, select, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; width: 100%; box-sizing: border-box; font-size: 15px; }  
        button { cursor: pointer; background: #0f172a; color: white; font-weight: bold; border: none; transition: 0.2s; }  
        button:active { transform: scale(0.96); opacity: 0.8; }  
        .card { background: #f1f5f9; padding: 10px; margin: 8px 0; border-radius: 8px; border-left: 5px solid #0f172a; font-size: 13px; position: relative; }  
        .card.negative { border-left: 5px solid #ef4444; color: #b91c1c; background: #fef2f2; }  
        .hidden { display: none !important; }  
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }  
        .vnc-box { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 18px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 2px solid #facc15; }  
        .vnc-val { font-size: 28px; font-weight: bold; color: #facc15; }  
        .mixed-box { background: #f8fafc; border: 2px solid #1e293b; padding: 10px; border-radius: 10px; margin: 10px 0; }  
        .change-box { background: #f0f9ff; border: 2px solid #0ea5e9; padding: 12px; border-radius: 12px; margin: 15px 0; }  
        .admin-box { border: 2px solid #ef4444; padding: 15px; border-radius: 12px; margin-top: 20px; background: #fff1f2; color: #991b1b; }  
        .label-sm { font-size: 11px; font-weight: bold; color: #64748b; margin-top: 5px; display: block; text-transform: uppercase; }  
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }  
        .modal-content { background: white; color: black; padding: 20px; border-radius: 15px; width: 95%; max-height: 90vh; overflow-y: auto; }  
        .btn-del { background: #ef4444; padding: 4px 8px; font-size: 10px; width: auto; position: absolute; right: 10px; top: 10px; color: white; border-radius: 5px; cursor: pointer; }  
        .nav-hist { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; padding-bottom: 5px; }  
        .nav-hist button { width: auto; font-size: 11px; white-space: nowrap; background: #64748b; padding: 8px 12px; }  
        .nav-hist button.active { background: #0ea5e9; }  
        .debt-alert { background: #fff7ed; border: 1px solid #ea580c; color: #9a3412; padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 5px; }
    </style>  
</head>  
<body>  <h1 style="text-align:center; padding: 10px; margin:0;">MKA Pro V5.3.0</h1>  

<div class="container">  
    <div id="loginSection">  
        <h2 style="text-align:center">Connexion</h2>  
        <input type="password" id="pinInput" placeholder="Code PIN Accès">  
        <button onclick="login()">OUVRIR SESSION</button>  
    </div>  

    <div id="appSection" class="hidden">  
        <div class="vnc-box">  
            <span style="font-size: 11px; opacity: 0.8;">VALEUR NETTE COMPTABLE (VNC)</span><br>  
            <div class="vnc-val" id="totalVNC">0.00 $</div>  
            <div style="font-size: 10px;">Taux: <span id="rateM"></span> | Stock: <span id="totalStock">0</span></div>  
        </div>  

        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">  
            <button onclick="logout()" style="background:#ef4444; width:auto; padding:8px 15px;">QUITTER</button>  
            <div style="text-align:right; font-size: 13px;">  
                <strong>Tiroir :</strong> <span id="caisseUSD" style="color:#16a34a">0</span>$ | <span id="caisseCDF" style="color:#16a34a">0</span>FC  
            </div>  
        </div>  

        <div id="operatorBalances"></div>  

        <div class="change-box">  
            <h4 style="margin:0 0 10px 0; color:#0369a1;">🔄 Change & Transfert</h4>  
            <select id="srcWallet" onchange="calcDest()"></select>  
            <div class="grid-2">  
                <input type="number" id="srcAmt" placeholder="Montant" oninput="calcDest()">  
                <select id="srcCurr" onchange="calcDest()"><option value="USD">USD</option><option value="CDF">CDF</option></select>  
            </div>  
            <label class="label-sm">Vers :</label>  
            <select id="destWallet"></select>  
            <div class="grid-2">  
                <input type="number" id="destAmt" readonly style="background:#e2e8f0; font-weight:bold">  
                <select id="destCurr" onchange="calcDest()"><option value="CDF">CDF</option><option value="USD">USD</option></select>  
            </div>  
            <input type="text" id="transferMotif" placeholder="Motif Transfert">  
            <button onclick="executeGlobalChange()" style="background:#0ea5e9; width:100%;">VALIDER TRANSFERT</button>  
        </div>  

        <hr>  
        <div id="debtSettlementBox" style="background:#fefce8; border:2px solid #eab308; padding:15px; border-radius:12px; margin-bottom:15px;">
            <h4 style="margin:0 0 5px 0; color:#854d0e;">💰 Remboursement / Paiement Dettes</h4>
            <div id="debtStatus" class="debt-alert hidden"></div>
            <select id="settleOpIdx" onchange="checkDebtBalance()"></select>  
            <input type="text" id="debtPersonName" placeholder="NOM DE LA PERSONNE" oninput="checkDebtBalance()">
            <div class="grid-2">  
                <input type="number" id="settleUSD" placeholder="Montant $">  
                <input type="number" id="settleCDF" placeholder="Montant FC">  
            </div>  
            <label class="label-sm" style="color:#16a34a;">Provenance/Destination :</label>
            <select id="settleDest" style="border: 1px solid #16a34a;"></select>
            <input type="text" id="settleMotif" placeholder="Motif additionnel">
            <button onclick="settleAccount()" style="background:#eab308; color:black;">VALIDER LE RÈGLEMENT</button>  
        </div>

        <hr>  
        <h2>Opérations Clients</h2>  
        <div class="grid-2">  
            <select id="operatorSelect" onchange="togglePaySim()"></select>  
            <select id="typeSelect" onchange="updateDefaultStockMove()"></select>  
        </div>  
        <div class="grid-2">  
            <input type="number" id="amount" placeholder="Montant Opération">  
            <input type="number" id="stkMove" placeholder="Stock (+/-)" value="0">  
        </div>  
        <select id="currency" style="margin-bottom: 10px;"><option value="USD">USD</option><option value="CDF">CDF</option></select>  

        <div id="mixedFields" class="mixed-box">  
            <label class="label-sm" style="color:#1e293b">Détail Cash (Tiroir) :</label>  
            <div class="grid-2">  
                <input type="number" id="mixUSD" placeholder="Cash $">  
                <div style="display:flex; gap:2px;">  
                    <input type="number" id="mixCDF" placeholder="Cash FC">  
                    <button onclick="autoCalcMix()" style="width:45px; background:#1e293b; font-size:10px;">CALC</button>  
                </div>  
            </div>  
            <div class="grid-2" style="margin-top:5px;">  
                <input type="number" id="commUSD" placeholder="+ Frais $">  
                <input type="number" id="commCDF" placeholder="+ Frais FC">  
            </div>  
        </div>  

        <label class="label-sm">Mode de Règlement :</label>  
        <select id="payMode" onchange="togglePaySim()">  
            <option value="cash">Paiement Cash (Tiroir)</option>  
            <option value="virtuel">Via une autre SIM (Inter-SIM)</option>  
            <option value="depense">Dépense (Sortie SIM)</option>  
            <option value="dette_client">Dette Client (Sortie non payée)</option>  
            <option value="dette_moi">Dette Moi (Entrée non payée)</option>  
        </select>  
          
        <div id="paySimBox" class="hidden" style="margin-top:5px;">  
            <label class="label-sm" style="color:#8b5cf6;">Choisir la SIM source :</label>  
            <select id="paySimSelect" style="border: 2px solid #8b5cf6;"></select>  
        </div>  

        <div id="debtNameBox" class="hidden">
            <label class="label-sm" style="color:#ef4444;">Nom de la personne (Dette) :</label>
            <input type="text" id="personName" placeholder="Ex: Maman Rose, Agent Airtel...">
        </div>
          
        <input type="text" id="motif" placeholder="Référence / Client" oninput="togglePaySim()">  
        <button onclick="addTransaction()" style="background:#16a34a; margin-top:10px;">ENREGISTRER L'OPÉRATION</button>  
        <button onclick="showFullHistory('general')" style="background:#64748b; margin-top:10px;">HISTORIQUES DÉTAILLÉS</button>  

        <div id="adminSection" class="hidden">  
            <div class="admin-box">  
                <h3>🔧 Configuration Admin</h3>  
                <div style="background:#fee2e2; padding:10px; border-radius:8px; margin-bottom:10px; color:black; border:1px solid #ef4444;">  
                    <h4>🔐 Sécurité & Codes PIN</h4>  
                    <div class="grid-2">  
                        <div><label class="label-sm">PIN Admin</label><input type="text" id="newPinAdmin" placeholder="Code Admin"></div>  
                        <div><label class="label-sm">PIN Employé</label><input type="text" id="newPinUser" placeholder="Code Employé"></div>  
                    </div>  
                    <button onclick="updatePins()" style="background:#b91c1c">CHANGER LES CODES</button>  
                </div>  

                <div style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; color:black;">  
                    <h4>Créer Type d'Action</h4>  
                    <input type="text" id="newTypeName" placeholder="Nom (ex: Vente SIM)">  
                    <div class="grid-2">  
                        <label class="label-sm">SIM (-/+)</label>  
                        <select id="impO"><option value="-1">SIM (-)</option><option value="1">SIM (+)</option><option value="0">SIM (0)</option></select>  
                    </div>  
                    <div class="grid-2">  
                        <label class="label-sm">Caisse (-/+)</label>  
                        <select id="impC"><option value="1">Caisse (+)</option><option value="-1">Caisse (-)</option><option value="0">Caisse (0)</option></select>  
                    </div>  
                    <div class="grid-2">  
                        <label class="label-sm">Impact Stock</label>  
                        <select id="impS"><option value="0">Aucun (0)</option><option value="-1">Vente (-1)</option><option value="1">Achat (+1)</option></select>  
                    </div>  
                    <button onclick="addType()" style="background:#0f172a; margin-top:5px;">CRÉER TYPE</button>  
                    <div id="adminTypeList" style="margin-top:10px; font-size:11px;"></div>  
                </div>  

                <div style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; color:black;">  
                    <h4>Paramètres Généraux</h4>  
                    <input type="number" id="newTaux" placeholder="Taux">  
                    <div class="grid-2">  
                        <input type="number" id="editCashUSD" placeholder="Caisse $">  
                        <input type="number" id="editCashCDF" placeholder="Caisse FC">  
                    </div>  
                    <button onclick="updateAdminBasics()" style="background:#0f172a">APPLIQUER</button>  
                </div>  

                <div style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; color:black;">  
                    <h4>Nouveau Compte</h4>  
                    <input type="text" id="newOpName" placeholder="Nom">  
                    <div class="grid-2">  
                        <input type="number" id="initUSD" placeholder="USD">  
                        <input type="number" id="initCDF" placeholder="CDF">  
                    </div>  
                    <div class="grid-2">  
                        <input type="number" id="initStock" placeholder="SIM">  
                        <input type="number" id="initPrice" placeholder="P.A. SIM $">  
                    </div>  
                    <button onclick="addOperator()" style="background:#b91c1c">CREER COMPTE</button>  
                </div>  
                <div id="adminOpEditList" style="margin-top:10px; color:black;"></div>  
            </div>  
        </div>  
    </div>  
</div>  

<div id="historyModal" class="modal hidden">  
    <div class="modal-content">  
        <button onclick="closeHistory()" style="background:#ef4444; float:right;">X</button>  
        <button onclick="exportHistory()" style="background:#16a34a; float:left; width:auto; padding:8px 15px;">TXT</button>  
        <div style="clear:both;"></div>  
        <h2 id="histTitle" style="text-align:center; margin:10px 0;">Historique</h2>  
        <div class="nav-hist">  
            <button id="btn-h-general" onclick="showFullHistory('general')">GÉNÉRAL</button>  
            <button id="btn-h-ventes" onclick="showFullHistory('ventes')">VENTES</button>  
            <button id="btn-h-dette_client" onclick="showFullHistory('dette_client')">DETTES CLIENTS</button>  
            <button id="btn-h-dette_moi" onclick="showFullHistory('dette_moi')">DETTES MOI</button>  
        </div>  
        <div id="fullHistoryList"></div>  
    </div>  
</div>  

<script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";  
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";  

    const firebaseConfig = {  
        apiKey: "AIzaSyDSK9sIPu8fvGebZQG9EdHBhlf7nl8Dmzs",  
        authDomain: "mka-mobile-money.firebaseapp.com",  
        databaseURL: "https://mka-mobile-money-default-rtdb.firebaseio.com",  
        projectId: "mka-mobile-money"  
    };  

    const app = initializeApp(firebaseConfig);  
    const db = getDatabase(app);  
    let data = { caisse:{USD:0, CDF:0}, operators:[], types:[], transactions:[], taux:2800, config: { pinAdmin: "1234", pinUser: "0000" }, debts: {} };  

    onValue(ref(db, 'mka_data'), (snap) => {   
        if(snap.val()) {   
            data = snap.val();   
            if(!data.transactions) data.transactions = [];   
            if(!data.types) data.types = [];
            if(!data.operators) data.operators = [];
            if(!data.config) data.config = { pinAdmin: "1234", pinUser: "0000" };
            if(!data.debts) data.debts = {};
            render();   
        }   
    });  
      
    const save = () => set(ref(db, 'mka_data'), data);  
    const fmt = (n) => parseFloat(n || 0).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).replace(/,/g, '.');  
    const normalize = (str) => str ? str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";  

    window.login = () => {  
        const p = document.getElementById("pinInput").value;  
        if(p === data.config.pinAdmin) {  
            document.getElementById("loginSection").classList.add("hidden");  
            document.getElementById("appSection").classList.remove("hidden");  
            document.getElementById("adminSection").classList.remove("hidden");  
            document.getElementById("newPinAdmin").value = data.config.pinAdmin;  
            document.getElementById("newPinUser").value = data.config.pinUser;  
        } else if(p === data.config.pinUser) {  
            document.getElementById("loginSection").classList.add("hidden");  
            document.getElementById("appSection").classList.remove("hidden");  
            document.getElementById("adminSection").classList.add("hidden");  
        } else { alert("Code PIN Incorrect"); }  
    };  

    window.logout = () => location.reload();  

    window.updatePins = () => {  
        const pa = document.getElementById("newPinAdmin").value, pu = document.getElementById("newPinUser").value;  
        if(pa && pu) { data.config.pinAdmin = pa; data.config.pinUser = pu; save(); alert("PIN mis à jour !"); }  
    };

    window.togglePaySim = () => {  
        const mode = document.getElementById("payMode").value;  
        const motif = normalize(document.getElementById("motif").value);
        const opIdx = document.getElementById("operatorSelect").value;
        const opName = data.operators[opIdx] ? normalize(data.operators[opIdx].name) : "";
        document.getElementById("paySimBox").classList.toggle("hidden", mode !== "virtuel");
        const isDebt = mode.includes("dette") || mode === "depense" || motif.includes("dette") || opName.includes("dette client") || opName.includes("dette moi");
        document.getElementById("debtNameBox").classList.toggle("hidden", !isDebt);
    };  

    window.checkDebtBalance = () => {
        const opIdx = document.getElementById("settleOpIdx").value;
        const op = data.operators[opIdx];
        const person = document.getElementById("debtPersonName").value.trim();
        const statusEl = document.getElementById("debtStatus");
        if(!person || !op) { statusEl.classList.add("hidden"); return; }
        const debtKey = `${normalize(op.name)}_${normalize(person)}`;
        const debt = data.debts[debtKey] || { USD: 0, CDF: 0 };
        statusEl.innerHTML = `Dette <b>${person}</b>: <b>${fmt(debt.USD)} $</b> | <b>${fmt(debt.CDF)} FC</b>`;
        statusEl.classList.remove("hidden");
    };

    window.autoCalcMix = () => {  
        const total = parseFloat(document.getElementById("amount").value) || 0;  
        const usd = parseFloat(document.getElementById("mixUSD").value) || 0;  
        const t = parseFloat(data.taux) || 1;  
        const reste = total - usd;  
        if(reste > 0) document.getElementById("mixCDF").value = Math.round(reste * t);  
    };  

    window.addTransaction = () => {  
        const opI = document.getElementById("operatorSelect").value, tyI = document.getElementById("typeSelect").value;  
        const amt = parseFloat(document.getElementById("amount").value) || 0, cur = document.getElementById("currency").value;  
        const mode = document.getElementById("payMode").value, motif = document.getElementById("motif").value;  
        const person = document.getElementById("personName").value.trim();
        const ty = data.types[tyI], op = data.operators[opI];  
        if(!amt || !ty || !op) { alert("Vérifiez Montant/Type/SIM"); return; }  
        
        const opName = normalize(op.name);
        const isDebtOp = mode.includes("dette") || normalize(motif).includes("dette") || opName.includes("dette client") || opName.includes("dette moi");
        if(isDebtOp && !person) { alert("Nom obligatoire pour une dette !"); return; }

        op[cur] = (parseFloat(op[cur]) || 0) + (amt * parseInt(ty.impO));  
        op.stock = (parseInt(op.stock) || 0) + (parseInt(document.getElementById("stkMove").value) || 0);  

        const cUSD = parseFloat(document.getElementById("commUSD").value) || 0, cCDF = parseFloat(document.getElementById("commCDF").value) || 0;  

        if(mode === "cash") {  
            const mUSD = parseFloat(document.getElementById("mixUSD").value) || 0, mCDF = parseFloat(document.getElementById("mixCDF").value) || 0;  
            if(mUSD > 0 || mCDF > 0) {  
                data.caisse.USD += (mUSD * parseInt(ty.impC)) + cUSD;   
                data.caisse.CDF += (mCDF * parseInt(ty.impC)) + cCDF;   
            } else {  
                data.caisse[cur] = (parseFloat(data.caisse[cur]) || 0) + (amt * parseInt(ty.impC));  
                data.caisse.USD += cUSD; data.caisse.CDF += cCDF;  
            }
            if(person && (normalize(motif).includes("dette") || opName.includes("dette client") || opName.includes("dette moi"))) {
                const debtKey = `${opName}_${normalize(person)}`;
                if(!data.debts[debtKey]) data.debts[debtKey] = { USD: 0, CDF: 0 };
                data.debts[debtKey][cur] += amt;
            }
        } else if(mode === "virtuel") {  
            const pIdx = document.getElementById("paySimSelect").value;  
            data.operators[pIdx][cur] = (parseFloat(data.operators[pIdx][cur]) || 0) - amt;  
            data.caisse.USD += cUSD; data.caisse.CDF += cCDF;  
        } else {  
            let targetTag = mode.replace("_", " ");  
            let targetOp = data.operators.find(o => normalize(o.name).includes(normalize(targetTag)));  
            if(targetOp) {  
                targetOp[cur] = (parseFloat(targetOp[cur]) || 0) + Math.abs(amt);   
                data.caisse.USD += cUSD; data.caisse.CDF += cCDF;
                if(person) {
                    const debtKey = `${normalize(targetOp.name)}_${normalize(person)}`;
                    if(!data.debts[debtKey]) data.debts[debtKey] = { USD: 0, CDF: 0 };
                    data.debts[debtKey][cur] += Math.abs(amt);
                }
            } else { alert("Créez le compte " + targetTag.toUpperCase()); return; }  
        }  
        data.transactions.unshift({ date: new Date().toLocaleString(), desc: `${ty.name} - ${op.name} (${person ? 'NOM: '+person+' | ' : ''}${motif})`, amt, cur, mode, typeNom: ty.name });  
        save(); alert("Enregistré !");  
        ["amount", "stkMove", "mixUSD", "mixCDF", "commUSD", "commCDF", "motif", "personName"].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = (id==="stkMove"?"0":""); });  
        togglePaySim();
    };  

    window.settleAccount = () => {  
        const opIdx = document.getElementById("settleOpIdx").value, person = document.getElementById("debtPersonName").value.trim();
        const sUSD = parseFloat(document.getElementById("settleUSD").value) || 0, sCDF = parseFloat(document.getElementById("settleCDF").value) || 0;
        const destIdx = document.getElementById("settleDest").value, motif = document.getElementById("settleMotif").value;
        const opDette = data.operators[opIdx];
        if(!opDette || !person || (sUSD === 0 && sCDF === 0)) { alert("Vérifiez les montants"); return; }
        
        const isDetteMoi = normalize(opDette.name).includes("dette moi");
        const impact = isDetteMoi ? -1 : 1; 

        if(destIdx === "caisse") { data.caisse.USD += (sUSD * impact); data.caisse.CDF += (sCDF * impact); }
        else { data.operators[destIdx].USD += (sUSD * impact); data.operators[destIdx].CDF += (sCDF * impact); }

        opDette.USD -= sUSD; opDette.CDF -= sCDF;
        const debtKey = `${normalize(opDette.name)}_${normalize(person)}`;
        if(data.debts[debtKey]) { data.debts[debtKey].USD -= sUSD; data.debts[debtKey].CDF -= sCDF; }

        data.transactions.unshift({ date: new Date().toLocaleString(), desc: `RÈGLEMENT: ${person} sur ${opDette.name} (${motif})`, amt: (sUSD || sCDF), cur: (sUSD>0&&sCDF>0?'MIXTE':(sUSD>0?'USD':'CDF')), mode: 'reglement', typeNom: 'reglement' });  
        save(); alert("Solder effectué !"); 
        document.getElementById("settleUSD").value = ""; document.getElementById("settleCDF").value = "";
        checkDebtBalance();
    };  

    // RESTAURATION DE LA LOGIQUE D'HISTORIQUE PAR MOTS-CLÉS
    window.showFullHistory = (filter) => {   
        const isAdmin = !document.getElementById("adminSection").classList.contains("hidden");  
        const list = document.getElementById("fullHistoryList");
        document.querySelectorAll(".nav-hist button").forEach(b => b.classList.remove("active"));  
        document.getElementById("btn-h-" + filter).classList.add("active");  
        
        let filtered = data.transactions;  

        if(filter === 'ventes') {
            filtered = data.transactions.filter(t => 
                normalize(t.typeNom || "").includes("vente") || 
                normalize(t.desc || "").includes("vente")
            );
        } else if(filter === 'dette_client') {
            filtered = data.transactions.filter(t => 
                t.mode === "dette_client" || 
                normalize(t.desc || "").includes("dette client")
            );
        } else if(filter === 'dette_moi') {
            filtered = data.transactions.filter(t => 
                t.mode === "dette_moi" || 
                normalize(t.desc || "").includes("dette moi")
            );
        } 

        list.innerHTML = filtered.map((t,i) => `<div class="card">${isAdmin ? `<button class="btn-del" onclick="deleteTransaction(${data.transactions.indexOf(t)})">SUPPR</button>` : ''}<b>${t.date}</b>: ${t.desc} - <strong>${fmt(t.amt)} ${t.cur}</strong></div>`).join("");   
        document.getElementById("historyModal").classList.remove("hidden");   
    };

    window.quickEditOp = (i) => {  
        const op = data.operators[i];  
        const nName = prompt("Nom :", op.name), nUSD = prompt("USD :", op.USD), nCDF = prompt("CDF :", op.CDF), nStk = prompt("SIM :", op.stock);  
        if(nName !== null) { data.operators[i] = { ...op, name: nName, USD: parseFloat(nUSD)||0, CDF: parseFloat(nCDF)||0, stock: parseInt(nStk)||0 }; save(); }  
    };

    window.calcDest = () => {  
        const amt = parseFloat(document.getElementById("srcAmt").value) || 0, t = parseFloat(data.taux) || 1;  
        const sc = document.getElementById("srcCurr").value, dc = document.getElementById("destCurr").value;  
        document.getElementById("destAmt").value = ((sc==="USD" && dc==="CDF") ? amt * t : (sc==="CDF" && dc==="USD") ? amt / t : amt).toFixed(2);  
    };  

    window.executeGlobalChange = () => {  
        const sIdx = document.getElementById("srcWallet").value, dIdx = document.getElementById("destWallet").value;  
        const sAmt = parseFloat(document.getElementById("srcAmt").value) || 0, dAmt = parseFloat(document.getElementById("destAmt").value) || 0;  
        const sc = document.getElementById("srcCurr").value, dc = document.getElementById("destCurr").value;  
        if(!sAmt) return;  
        if(sIdx === "caisse") data.caisse[sc] -= sAmt; else data.operators[sIdx][sc] -= sAmt;  
        if(dIdx === "caisse") data.caisse[dc] += dAmt; else data.operators[dIdx][dc] += dAmt;  
        data.transactions.unshift({ date: new Date().toLocaleString(), desc: `TRANSFERT INTERNE`, amt: sAmt, cur: sc, mode: 'transfert' });  
        save(); alert("Transfert effectué");  
    };  

    window.updateAdminBasics = () => {  
        const tX = document.getElementById("newTaux").value, uX = document.getElementById("editCashUSD").value, cX = document.getElementById("editCashCDF").value;  
        if(tX) data.taux = parseFloat(tX); if(uX) data.caisse.USD = parseFloat(uX); if(cX) data.caisse.CDF = parseFloat(cX);  
        save(); alert("Mis à jour !");  
    };

    window.addOperator = () => {  
        const op = { name: document.getElementById("newOpName").value, USD: parseFloat(document.getElementById("initUSD").value) || 0, CDF: parseFloat(document.getElementById("initCDF").value) || 0, stock: parseInt(document.getElementById("initStock").value) || 0, prixAchat: parseFloat(document.getElementById("initPrice").value) || 0 };  
        if(op.name) { data.operators.push(op); save(); alert("Compte créé"); }  
    };  

    window.addType = () => {  
        const name = document.getElementById("newTypeName").value, impO = parseInt(document.getElementById("impO").value), impC = parseInt(document.getElementById("impC").value), impS = parseInt(document.getElementById("impS").value);  
        if(name) { data.types.push({ name, impO, impC, impS }); save(); alert("Type créé"); }  
    };

    window.deleteTransaction = (idx) => { if(confirm("Supprimer ?")) { data.transactions.splice(idx, 1); save(); window.showFullHistory('general'); } };
    window.closeHistory = () => document.getElementById("historyModal").classList.add("hidden");  
    window.updateDefaultStockMove = () => { const ty = data.types[document.getElementById("typeSelect").value]; if(ty) document.getElementById("stkMove").value = ty.impS || 0; };
    window.exportHistory = () => { let content = "MKA PRO - HISTORIQUE\n"; data.transactions.forEach(t => content += `${t.date} | ${t.desc} | ${t.amt} ${t.cur}\n`); const blob = new Blob([content], {type:"text/plain"}); const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="mka_history.txt"; a.click(); };

    function render() {  
        const t = parseFloat(data.taux) || 1;  
        document.getElementById("caisseUSD").innerText = fmt(data.caisse.USD);  
        document.getElementById("caisseCDF").innerText = fmt(data.caisse.CDF);  
        document.getElementById("rateM").innerText = t;  
        let totalCaisse = (parseFloat(data.caisse.USD) || 0) + ((parseFloat(data.caisse.CDF) || 0) / t);  
        let totalSims = 0, detteClient = 0, passif = 0, totalS = 0;  
        document.getElementById("operatorBalances").innerHTML = data.operators.map((o, i) => {  
            const usd = parseFloat(o.USD) || 0, cdf = parseFloat(o.CDF) || 0, stk = parseInt(o.stock) || 0, px = parseFloat(o.prixAchat) || 0;  
            const n = normalize(o.name), val = usd + (cdf / t);  
            let isNeg = false;  
            if(n.includes("dette moi")) { isNeg = true; passif += val; }   
            else if(n.includes("depense")) { isNeg = true; }  
            else if(n.includes("dette client")) { isNeg = true; detteClient += val; }   
            else { totalSims += (val + (stk * px)); }  
            totalS += stk;  
            return `<div class="card ${isNeg ? 'negative' : ''}"><b>${o.name}</b>: ${fmt(o.USD)}$ | ${fmt(o.CDF)}FC<br><small>Stock: ${o.stock} SIM</small></div>`;  
        }).join("");  
        document.getElementById("totalVNC").innerText = fmt(totalCaisse + totalSims + detteClient - passif) + " $";  
        document.getElementById("totalStock").innerText = totalS;  
        const opOps = data.operators.map((o, i) => `<option value="${i}">${o.name}</option>`).join("");  
        document.getElementById("operatorSelect").innerHTML = opOps;  
        document.getElementById("srcWallet").innerHTML = '<option value="caisse">Caisse</option>' + opOps;  
        document.getElementById("destWallet").innerHTML = '<option value="caisse">Caisse</option>' + opOps;  
        document.getElementById("paySimSelect").innerHTML = opOps;  
        document.getElementById("settleOpIdx").innerHTML = opOps;  
        document.getElementById("settleDest").innerHTML = '<option value="caisse">🏠 CAISSE (CASH)</option>' + opOps;
        document.getElementById("adminOpEditList").innerHTML = data.operators.map((o,i) => `<div class="card">${o.name} <button class="btn-del" onclick="data.operators.splice(${i},1);save()">X</button> <button onclick="quickEditOp(${i})" style="width:auto; padding:2px 8px; font-size:10px; background:#0ea5e9; border-radius:5px;">EDIT</button></div>`).join("");  
        document.getElementById("typeSelect").innerHTML = data.types.map((t,i) => `<option value="${i}">${t.name}</option>`).join("");  
        document.getElementById("adminTypeList").innerHTML = data.types.map((t,i) => `<div class="card">${t.name} <button onclick="data.types.splice(${i},1);save()" class="btn-del">X</button></div>`).join("");  
    }  
</script>
</body>  
</html>
